<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <section class="intro-card">
            <p class="eyebrow">AI Pre-Course Project</p>
            <h1>AI Quiz Challenge</h1>
            <p class="subtitle">
                Test your basic AI knowledge with a short interactive quiz.
                Answer each question, track your score, and review your result.
            </p>
        </section>

        <section class="quiz-card" aria-live="polite">
            <div class="top-row">
                <div>
                    <p class="small-label">Question</p>
                    <h2 id="question-number">1 of 8</h2>
                </div>
                <div class="score-box">
                    <span>Score</span>
                    <strong id="score">0</strong>
                </div>
            </div>

            <div class="progress-track" aria-label="Quiz progress">
                <div id="progress-bar" class="progress-bar"></div>
            </div>

            <h3 id="question-text">Loading question...</h3>
            <div id="answer-buttons" class="answer-grid"></div>

            <p id="feedback" class="feedback"></p>

            <div class="action-row">
                <button id="next-btn" class="primary-btn" disabled>Next Question</button>
                <button id="restart-btn" class="secondary-btn" type="button">Restart</button>
            </div>
        </section>

        <section id="result-card" class="result-card hidden">
            <p class="eyebrow">Final Result</p>
            <h2 id="result-title">Quiz Complete</h2>
            <p id="result-message"></p>
            <button id="play-again-btn" class="primary-btn" type="button">Play Again</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
